# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Data Science Professional Portfolio - Crimetology
email:
description: "Data Science Apprentice portfolio."
github_username: ClimatologyProjectProfile
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: "Europe/London"

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Anonymous"
  avatar : "/assets/images/bio-photo.png"
  bio    : "An open space for my Data Science projects."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ClimatologyProjectProfile"


collections:
  projects:
    output: true
    permalink: /projects/:path/


footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ClimatologyProjectProfile"

defaults:
# _projects
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      read_time: true
      comments: true
      share: true
      sidebar:
        nav: "docs"  

# _pages (for about)
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      read_time: true
      comments: true
      share: true
      sidebar:
        nav: "docs"  
